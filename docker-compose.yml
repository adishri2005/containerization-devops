version: '3.8'

services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - macvlan_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/webapp
    ports:
      - "8000:8000"
    networks:
      - macvlan_net
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

networks:
  macvlan_net:
    external: true
    name: host_macvlan
